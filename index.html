<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>portfolio-terminal</title>
  </head>
  <body>
    <!-- index.html -->
<main class="terminal-window">
  <!-- Barra superior estilo ventana de SO -->
  <header class="terminal-header">
    <div class="buttons">
      <span class="btn red"></span>
      <span class="btn yellow"></span>
      <span class="btn green"></span>
    </div>
    <div class="title">chester@portfolio: ~</div>
  </header>

  <section class="terminal-body" id="terminal-content">
    <!-- El contenido se inyectará aquí o será estático -->
    <div class="command-line">
      <span class="prompt">guest@chester:~$</span>
      <span class="typed-text">whoami</span>
    </div>
    <div class="response">
      <p>Hola, soy Chester. Desarrollador Fullstack apasionado por TypeScript y la arquitectura limpia.</p>
    </div>
  </section>
</main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
